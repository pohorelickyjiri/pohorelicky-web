<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiří Pohořelický</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --text: #f0ece4;
      --muted: #7a7570;
      --accent: #c8a97e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 1;
      letter-spacing: -0.02em;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.2em;
      margin-bottom: 1.5rem;
    }

    .name .word {
      display: inline-flex;
      overflow: hidden;
    }

    .name .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px) rotate(4deg);
      animation: charIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .name .char.accent {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 2.5rem auto;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.2s;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 1.5vw, 0.95rem);
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.4s;
    }

    .tagline span {
      color: var(--text);
    }

    @keyframes charIn {
      to {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Subtle grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Graphic Designer &amp; Creative</div>
    <div class="name" id="name"></div>
    <div class="divider"></div>
    <div class="tagline">
      <span>Design</span> rooted in craft &mdash; expanding into <span>code &amp; AI</span>
    </div>
  </div>

  <script>
    const fullName = [
      { text: "Jiří", accent: false },
      { text: "Pohořelický", accent: true }
    ];

    const nameEl = document.getElementById('name');
    let delay = 0.6;

    fullName.forEach(word => {
      const wordEl = document.createElement('span');
      wordEl.className = 'word';

      [...word.text].forEach(ch => {
        const span = document.createElement('span');
        span.className = 'char' + (word.accent ? ' accent' : '');
        span.textContent = ch === ' ' ? ' ' : ch;
        span.style.animationDelay = delay + 's';
        delay += 0.04;
        wordEl.appendChild(span);
      });

      nameEl.appendChild(wordEl);
      delay += 0.08;
    });
  </script>
</body>
</html>
