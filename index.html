<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiří Pohořelický</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #888;
      font-weight: 400;
      max-width: 480px;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #f0f0f0;
      border-radius: 50%;
      margin: 2.5rem auto 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name">Jiří Pohořelický</div>
    <div class="tagline">Graphic Designer expanding into code and AI — something new is coming.</div>
    <div class="dot"></div>
  </div>
</body>
</html>
